<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS POS - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b7ddd, #5dade2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b7ddd;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(59,125,221,0.2);
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b7ddd, #2c5aa0);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59,125,221,0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            padding: 0 16px;
        }
        .btn-google {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .btn-google:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }
        .google-icon {
            width: 20px;
            height: 20px;
        }
        .error-msg {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ff6b7a;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .success-msg {
            background: rgba(40,167,69,0.15);
            border: 1px solid rgba(40,167,69,0.3);
            color: #6bff8e;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
        .footer a {
            color: #3b7ddd;
            text-decoration: none;
        }
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .remember-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
        }
        .remember-row input[type="checkbox"] {
            accent-color: #3b7ddd;
        }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .google-loading {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .google-loading.show {
            display: flex;
        }
        .google-loading-content {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px 40px;
            border-radius: 16px;
            text-align: center;
        }
        .google-loading-content p {
            margin-top: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="google-loading" id="googleLoading">
        <div class="google-loading-content">
            <div class="loading-spinner" style="width:24px;height:24px;border-width:3px;"></div>
            <p>正在使用 Google 账号登录...</p>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>VS POS</h1>
                <p>专业服务行业管理系统 v2.0</p>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="输入密码" required autocomplete="current-password">
                </div>
                <div class="remember-row">
                    <label><input type="checkbox" id="remember"> 记住我</label>
                </div>
                <button type="submit" class="btn-login btn-primary" id="loginBtn">
                    登 录
                </button>
            </form>

            <div class="divider"><span>或</span></div>

            <button class="btn-google" onclick="handleGoogleLogin()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                使用 Google 账号登录
            </button>

            <div class="footer">
                <p>默认账号: <strong>admin</strong> / <strong>admin123</strong></p>
                <p style="margin-top:8px;">VS POS System &copy; 2024</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('successMsg').classList.remove('show');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.classList.add('show');
            document.getElementById('errorMsg').classList.remove('show');
        }

        function setLoading(loading) {
            const btn = document.getElementById('loginBtn');
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> 登录中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = '登 录';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            setLoading(true);

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || '登录失败');
                    return;
                }

                localStorage.setItem('vspos_token', data.token);
                localStorage.setItem('vspos_user', JSON.stringify(data.user));

                if (remember) {
                    localStorage.setItem('vspos_remember', 'true');
                }

                showSuccess('登录成功，正在跳转...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (err) {
                showError('网络连接失败，请检查后端服务');
            } finally {
                setLoading(false);
            }
        }

        async function handleGoogleLogin() {
            // Google Sign-In requires a client ID from Google Cloud Console
            // For now, we'll use a popup-based approach
            const clientId = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
            
            // Check if user has configured Google Client ID
            if (clientId === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
                showError('Google 登录尚未配置。请联系管理员在 Google Cloud Console 创建 OAuth2 客户端ID。\n\n临时解决方案：使用默认账号 admin / admin123 登录');
                return;
            }

            document.getElementById('googleLoading').classList.add('show');

            try {
                // Use Google Identity Services
                const response = await fetch(`https://accounts.google.com/gsi/client`, {
                    method: 'GET'
                });

                // Create a temporary Google Sign-In flow
                const googleAuth = await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = 'https://accounts.google.com/gsi/client';
                    script.onload = () => {
                        const client = google.accounts.oauth2.initTokenClient({
                            client_id: clientId,
                            scope: 'email profile',
                            callback: (resp) => {
                                if (resp.error) {
                                    reject(new Error(resp.error));
                                } else {
                                    resolve(resp.access_token);
                                }
                            }
                        });
                        client.requestAccessToken();
                    };
                    script.onerror = () => reject(new Error('Failed to load Google SDK'));
                    document.head.appendChild(script);
                });

                // Get user info from Google
                const userInfo = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                    headers: { Authorization: `Bearer ${googleAuth}` }
                }).then(r => r.json());

                // Send to our backend
                const res = await fetch(`${API_BASE}/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: googleAuth })
                });

                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Google 登录失败');
                    return;
                }

                localStorage.setItem('vspos_token', data.token);
                localStorage.setItem('vspos_user', JSON.stringify(data.user));

                showSuccess(`欢迎, ${data.user.name}! 登录成功...`);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (err) {
                showError('Google 登录失败: ' + err.message);
            } finally {
                document.getElementById('googleLoading').classList.remove('show');
            }
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('vspos_token');
            if (token) {
                fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                }).then(res => {
                    if (res.ok) {
                        window.location.href = 'index.html';
                    } else {
                        localStorage.removeItem('vspos_token');
                        localStorage.removeItem('vspos_user');
                    }
                }).catch(() => {
                    localStorage.removeItem('vspos_token');
                    localStorage.removeItem('vspos_user');
                });
            }
        });
    </script>
</body>
</html>
