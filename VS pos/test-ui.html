<!DOCTYPE html>
<html>
<head>
    <title>VS POS UI Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-btn { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #log { margin-top: 20px; padding: 10px; background-color: #f8f9fa; height: 200px; overflow-y: auto; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    <h1>VS POS UI Test</h1>
    <button class="test-btn success" onclick="testAPI()">Test API Connection</button>
    <button class="test-btn success" onclick="testDOM()">Test DOM Manipulation</button>
    <button class="test-btn success" onclick="testEventListeners()">Test Event Listeners</button>
    <button class="test-btn success" onclick="clearLog()">Clear Log</button>
    
    <div id="log"></div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.innerHTML = `<span>[${timestamp}]</span> ${message}`;
            if (type === 'error') entry.className = 'error';
            else if (type === 'success') entry.className = 'success';
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        async function testAPI() {
            log('Testing API connection...');
            try {
                const response = await fetch('http://localhost:3001/api/health');
                if (response.ok) {
                    const data = await response.json();
                    log(`✅ API Health Check Passed: ${JSON.stringify(data)}`, 'success');
                } else {
                    log(`❌ API Health Check Failed: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`❌ API Connection Error: ${error.message}`, 'error');
            }
        }
        
        function testDOM() {
            log('Testing DOM manipulation...');
            try {
                const testElement = document.createElement('div');
                testElement.textContent = 'Test Element';
                testElement.style.color = 'blue';
                document.body.appendChild(testElement);
                log('✅ DOM manipulation successful', 'success');
                // Clean up
                document.body.removeChild(testElement);
            } catch (error) {
                log(`❌ DOM Error: ${error.message}`, 'error');
            }
        }
        
        function testEventListeners() {
            log('Testing event listeners...');
            try {
                const testBtn = document.createElement('button');
                testBtn.textContent = 'Test Button';
                let clicked = false;
                testBtn.addEventListener('click', () => {
                    clicked = true;
                    log('✅ Event listener triggered', 'success');
                });
                document.body.appendChild(testBtn);
                testBtn.click();
                if (!clicked) throw new Error('Event listener not triggered');
                document.body.removeChild(testBtn);
                log('✅ Event listeners working', 'success');
            } catch (error) {
                log(`❌ Event Listener Error: ${error.message}`, 'error');
            }
        }
        
        // Auto test on load
        window.addEventListener('DOMContentLoaded', () => {
            log('Page loaded successfully');
            testAPI();
        });
    </script>
</body>
</html>
